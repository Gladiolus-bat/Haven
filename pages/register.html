<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haven - Register</title>
</head>
<body>
    <header>

    </header>

    <main>

        <div class="register-container">

            <div class="left"></div>

            <div class="right">

                <form class="register-form">

                    <h2>Create Account</h2>
                    
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Enter your name" required>
                    
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="Enter your phone number" required>
                    
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>

                    <div class="checkbox">
                        <input type="checkbox" name="checkbox" id="terms">
                        <label for="terms">I have read and agree to the <a href="#">Terms of Service</a></label>
                    </div>

                    <button type="submit" class="btn">Register</button>

                    <a href="#" class="forgot">Forgot Password?</a>

                    <p class="note">This site is protected by reCAPTCHA and the Google Privacy Policy and Terms of Service apply.</p>

                    <button class="login-btn">Already have an account? Login</button>
                </form>

            </div>
            
        </div>
    </main>

    <footer>

    </footer>

</body>
</html>
